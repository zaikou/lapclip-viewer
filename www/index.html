<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>LAP CLIP Viewer</title>
<link rel="stylesheet" href="css/style.css">
<!-- Security: input validation in app.js; CSP omitted for file:// compat -->
</head>
<body>

<div id="splash" class="screen">
  <div class="splash-content">
    <h1>LAP CLIP Viewer</h1>
    <p class="sub">F1 Live Timing Style</p>
    <div class="loading-dots"><span></span><span></span><span></span></div>
  </div>
</div>

<div id="screen-event" class="screen hidden">
  <header>
    <h1>LAP CLIP Viewer</h1>
    <nav id="year-tabs" class="year-tabs"></nav>
  </header>
  <div class="url-input-bar">
    <input id="url-input" type="text" placeholder="URLを入力して開く...">
    <button id="url-load-btn">開く</button>
  </div>
  <main id="event-list" class="scrollable"></main>
</div>

<div id="screen-category" class="screen hidden">
  <header>
    <button id="back-btn-category" class="back">&#x2039;</button>
    <h1 id="category-title"></h1>
  </header>
  <main id="category-grid" class="grid-2col scrollable"></main>
</div>

<div id="screen-loading" class="screen hidden">
  <header>
    <button id="back-btn-loading" class="back">&#x2039;</button>
    <h1>データ取得中...</h1>
  </header>
  <main class="loading-content">
    <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
    <p id="progress-text">0 / 0 選手</p>
    <div id="progress-list" class="progress-list"></div>
  </main>
</div>

<div id="screen-timing" class="screen hidden">
  <header>
    <button id="back-btn-timing" class="back">&#x2039;</button>
    <h1 id="timing-title"></h1>
    <button id="refresh-btn" class="icon-btn">&#x21bb;</button>
  </header>
  <nav id="tab-nav" class="tab-nav">
    <button class="tab-btn active" data-tab="tab-overall">総合</button>
    <button class="tab-btn" data-tab="tab-overall-ct">総合（経過時間）</button>
    <button class="tab-btn" data-tab="tab-chart">グラフ</button>
  </nav>
  <main class="tab-content scrollable">
    <div id="tab-overall" class="tab-pane active"></div>
    <div id="tab-overall-ct" class="tab-pane"></div>
    <div id="tab-chart" class="tab-pane"></div>
  </main>
</div>

<script src="js/parser.js"></script>
<script src="js/processor.js"></script>
<script src="js/views.js"></script>
<script src="js/chart.js"></script>
<script src="js/scraper.js"></script>
<script src="js/app.js"></script>
</body>
</html>
